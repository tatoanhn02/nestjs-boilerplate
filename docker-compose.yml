services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-nestjs-base
    ports:
      - '3050:3050'
    depends_on:
      - redis
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/nestjs-base
    networks:
      - backend-network

  redis:
    image: redis
    container_name: redis
    ports:
      - '6379:6379'
    networks:
      - backend-network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - backend-network

volumes:
  mongodb_data:

networks:
  backend-network:
    name: backend-network
